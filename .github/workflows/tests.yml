name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.4"

      - name: Run AeroBriefAITests
        run: |
          set -o pipefail
          xcodebuild test \
            -project AeroBriefAI.xcodeproj \
            -scheme AeroBriefAI \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            | xcpretty
